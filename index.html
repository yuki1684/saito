<!DOCTYPE html>
<html>

<head>

	<title>Navbar Demo</title>

	<!-- Bootstrap CSS -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
	>

	<style>

	/* スムーズスクロール */
	html {
		scroll-behavior: smooth;
	}

	/* Navbar に隠れないようにする */
	section {
		scroll-margin-top: 80px;
		min-height: 500px;
	}

	</style>


</head>

<body>

	<!-- Home -->
<section id="home">
	<h2>Home</h2>
	<p>Home section</p>
</section>

<!-- About -->
<section id="about">
	<h2>About</h2>
	<p>About section</p>
</section>

<!-- Gallery -->
<section id="gallery">
	<h2>Gallery</h2>
	<p>Gallery section</p>
</section>

<!-- Contact -->
<section id="contact">
	<h2>Contact</h2>
	<p>Contact section</p>
</section>




	<!-- Bootstrap JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
